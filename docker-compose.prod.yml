# Production compose file.
#
# This file expects PRE-BUILT images pulled from a registry (ACR in
# Phase 1 deploy-pipeline; GHCR or local during smoke tests). It does
# NOT build images at deploy time. CI must build + push backend and
# frontend images, then SSH to the VM and run `docker compose pull &&
# up -d --wait`.
#
# Required environment variables (all `:?`-guarded — compose fails fast
# if missing):
#   - MSAI_REGISTRY        : registry hostname, e.g. msai.azurecr.io
#   - MSAI_BACKEND_IMAGE   : repo name for backend, e.g. msai-backend
#   - MSAI_FRONTEND_IMAGE  : repo name for frontend, e.g. msai-frontend
#   - MSAI_GIT_SHA         : tag pinning a deployment to an immutable image
#   - POSTGRES_PASSWORD    : Postgres password
#   - REPORT_SIGNING_SECRET: 32+ char secret (`openssl rand -base64 48`).
#                            Required by EVERY service that imports
#                            ``msai.core.config.settings`` because the
#                            production-mode validator at
#                            ``backend/src/msai/core/config.py:295``
#                            raises at import time. Workers + migrate
#                            inherit the same value via interpolation.
#   - AZURE_TENANT_ID      : Entra ID tenant for backend JWT validation
#   - AZURE_CLIENT_ID      : Entra ID app id
#   - CORS_ORIGINS         : JSON list of allowed origins,
#                            e.g. '["https://msai.example.com"]'
#   - IB_ACCOUNT_ID        : starts with DU (paper) or U (live)
#   - TWS_USERID/PASSWORD  : IB Gateway login (only when broker profile)
#
# Optional env (sane defaults):
#   - JWT_TENANT_ID/CLIENT_ID : default to AZURE_*
#   - MSAI_API_KEY            : alternative to JWT for dev/CLI
#   - POLYGON_API_KEY         : empty disables Polygon ingestion
#   - DATABENTO_API_KEY       : empty disables Databento ingestion
#   - PUBLIC_API_URL          : used for frontend SSR fallback only
#   - TRADING_MODE            : ``paper`` (default) or ``live``
#   - IB_PORT                 : 4004 paper (default), 4003 live — the gnzsnz
#                               socat proxy port. Client containers (backend,
#                               live-supervisor) connect through socat; IB
#                               Gateway itself binds to 127.0.0.1:4002/4001
#                               internally (see ``IB_API_PORT`` below).
#   - IB_API_PORT             : 4002 paper (default), 4001 live — gateway's
#                               internal bind, controls what ``ib-gateway``
#                               tells the gnzsnz image to launch. Decoupled
#                               from ``IB_PORT`` so live-mode flip requires
#                               BOTH overrides explicit (TRADING_MODE=live,
#                               IB_PORT=4003, IB_API_PORT=4001).
#
# Profile usage:
#   - default profile: postgres, redis, migrate, backend, all arq workers,
#     frontend. Safe for staging/CI deploys.
#   - broker profile: live-supervisor + ib-gateway. Only start with
#     ``COMPOSE_PROFILES=broker docker compose ... up -d`` when an
#     operator is actively running paper or live trading. Mirrors the
#     dev compose pattern. Council Blocking Objection #7: re-deploying
#     ib-gateway during an active live session silently disconnects the
#     trading client (NautilusTrader gotcha #3 — duplicate client_id).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: msai
      POSTGRES_USER: msai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U msai"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # One-shot migration runner. Runs `alembic upgrade head` once and exits.
  # Backend + every worker depends on this completing successfully so
  # they never boot against a pre-migration schema. Built from the same
  # backend image (alembic/ + alembic.ini are now COPY'd into it).
  migrate:
    image: ${MSAI_REGISTRY:?Set MSAI_REGISTRY}/${MSAI_BACKEND_IMAGE:?Set MSAI_BACKEND_IMAGE}:${MSAI_GIT_SHA:?Set MSAI_GIT_SHA}
    command: ["alembic", "upgrade", "head"]
    working_dir: /app
    environment:
      DATABASE_URL: postgresql+asyncpg://msai:${POSTGRES_PASSWORD}@postgres:5432/msai
      ENVIRONMENT: production
      # Required because alembic/env.py imports msai.core.config.settings
      # which triggers the prod-mode REPORT_SIGNING_SECRET validator at
      # config.py:295 — without this the migration fails at import time
      # before alembic even runs.
      REPORT_SIGNING_SECRET: ${REPORT_SIGNING_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    image: ${MSAI_REGISTRY}/${MSAI_BACKEND_IMAGE}:${MSAI_GIT_SHA}
    ports:
      # Slice 3: bind to loopback only — Caddy is the public ingress on 80/443.
      # VM-local debugging via curl http://127.0.0.1:8000/health still works.
      # NSG only allows 22/80/443 inbound but loopback bind is defense-in-depth
      # against accidental NSG changes that might expose 8000 publicly.
      - "127.0.0.1:8000:8000"
    volumes:
      - app_data:/app/data
    environment:
      DATABASE_URL: postgresql+asyncpg://msai:${POSTGRES_PASSWORD}@postgres:5432/msai
      REDIS_URL: redis://redis:6379
      DATA_ROOT: /app/data
      # Where the strategy auto-registration scanner looks for ``*.py``
      # files. Dev compose sets this; prod compose was missing it before
      # 2026-05-12, so the resolved default (``__file__.parents[4] /
      # strategies``) pointed at ``/strategies`` (doesn't exist in the
      # installed-venv image) and the strategy registry stayed empty.
      # Must match the ``COPY ... /app/strategies`` in ``backend/Dockerfile``.
      STRATEGIES_ROOT: /app/strategies
      ENVIRONMENT: production
      # Production-mode mandatory secret (validated at config.py:295).
      # The :? guard fires once here, on the first interpolation; downstream
      # services interpolate the resolved value via `${REPORT_SIGNING_SECRET}`.
      REPORT_SIGNING_SECRET: ${REPORT_SIGNING_SECRET:?Set REPORT_SIGNING_SECRET in .env (openssl rand -base64 48)}
      # Auth — backend imports msal/jwt validators that read these.
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:?Set AZURE_TENANT_ID in .env}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:?Set AZURE_CLIENT_ID in .env}
      JWT_TENANT_ID: ${JWT_TENANT_ID:-${AZURE_TENANT_ID}}
      JWT_CLIENT_ID: ${JWT_CLIENT_ID:-${AZURE_CLIENT_ID}}
      CORS_ORIGINS: ${CORS_ORIGINS:?Set CORS_ORIGINS in .env (JSON list of allowed origins)}
      MSAI_API_KEY: ${MSAI_API_KEY:-}
      POLYGON_API_KEY: ${POLYGON_API_KEY:-}
      DATABENTO_API_KEY: ${DATABENTO_API_KEY:-}
      # Codex iter4 P1: ``api/live.py`` reads
      # ``settings.ib_account_id`` when creating the deployment
      # row; the live-supervisor's payload factory reads it again
      # during spawn. Both must agree or the new paper/live safety
      # guard rejects every live-mode deployment and silently uses
      # the wrong account for paper. Same fail-fast ``:?``
      # semantics as live-supervisor so compose fails instantly
      # without credentials.
      IB_HOST: ${IB_HOST:-ib-gateway}
      # gnzsnz/ib-gateway runs IB Gateway bound to 127.0.0.1:4002 (paper)
      # internally and exposes a socat proxy on 0.0.0.0:4004 that
      # re-originates connections as localhost. Cross-container clients
      # MUST target the socat port (4004 paper / 4003 live), not the
      # loopback bind. The 2026-05-12 paper-drill discovered the prior
      # 4002 default TCP-connects fine but the IB API handshake times
      # out — surfaced ONLY when a real broker drill ran. Live-mode flip
      # requires BOTH ``IB_PORT=4003`` and ``IB_API_PORT=4001`` (see
      # ib-gateway service below).
      IB_PORT: ${IB_PORT:-4004}
      IB_ACCOUNT_ID: ${IB_ACCOUNT_ID:?Set IB_ACCOUNT_ID in .env}
      IB_MARKET_DATA_TYPE: ${IB_MARKET_DATA_TYPE:-REALTIME}
      IB_USE_REGULAR_TRADING_HOURS: ${IB_USE_REGULAR_TRADING_HOURS:-false}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # See dev compose for rationale — Codex P2 iter1 fix: probe
      # /health via python stdlib so --wait actually waits for
      # uvicorn to bind, not just for the container to enter
      # ``running`` state.
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=2).status == 200 else 1)",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  backtest-worker:
    image: ${MSAI_REGISTRY}/${MSAI_BACKEND_IMAGE}:${MSAI_GIT_SHA}
    command: ["python", "-m", "arq", "msai.workers.settings.WorkerSettings"]
    volumes:
      - app_data:/app/data
    environment:
      DATABASE_URL: postgresql+asyncpg://msai:${POSTGRES_PASSWORD}@postgres:5432/msai
      REDIS_URL: redis://redis:6379
      DATA_ROOT: /app/data
      # Where the strategy auto-registration scanner looks for ``*.py``
      # files. Dev compose sets this; prod compose was missing it before
      # 2026-05-12, so the resolved default (``__file__.parents[4] /
      # strategies``) pointed at ``/strategies`` (doesn't exist in the
      # installed-venv image) and the strategy registry stayed empty.
      # Must match the ``COPY ... /app/strategies`` in ``backend/Dockerfile``.
      STRATEGIES_ROOT: /app/strategies
      ENVIRONMENT: production
      # Required: workers import msai.core.config which validates this in production.
      REPORT_SIGNING_SECRET: ${REPORT_SIGNING_SECRET}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  research-worker:
    image: ${MSAI_REGISTRY}/${MSAI_BACKEND_IMAGE}:${MSAI_GIT_SHA}
    command: ["python", "-m", "arq", "msai.workers.research_settings.ResearchWorkerSettings"]
    volumes:
      - app_data:/app/data
    environment:
      DATABASE_URL: postgresql+asyncpg://msai:${POSTGRES_PASSWORD}@postgres:5432/msai
      REDIS_URL: redis://redis:6379
      DATA_ROOT: /app/data
      # Where the strategy auto-registration scanner looks for ``*.py``
      # files. Dev compose sets this; prod compose was missing it before
      # 2026-05-12, so the resolved default (``__file__.parents[4] /
      # strategies``) pointed at ``/strategies`` (doesn't exist in the
      # installed-venv image) and the strategy registry stayed empty.
      # Must match the ``COPY ... /app/strategies`` in ``backend/Dockerfile``.
      STRATEGIES_ROOT: /app/strategies
      ENVIRONMENT: production
      REPORT_SIGNING_SECRET: ${REPORT_SIGNING_SECRET}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  portfolio-worker:
    image: ${MSAI_REGISTRY}/${MSAI_BACKEND_IMAGE}:${MSAI_GIT_SHA}
    command: ["python", "-m", "arq", "msai.workers.portfolio_settings.WorkerSettings"]
    volumes:
      - app_data:/app/data
    environment:
      DATABASE_URL: postgresql+asyncpg://msai:${POSTGRES_PASSWORD}@postgres:5432/msai
      REDIS_URL: redis://redis:6379
      DATA_ROOT: /app/data
      # Where the strategy auto-registration scanner looks for ``*.py``
      # files. Dev compose sets this; prod compose was missing it before
      # 2026-05-12, so the resolved default (``__file__.parents[4] /
      # strategies``) pointed at ``/strategies`` (doesn't exist in the
      # installed-venv image) and the strategy registry stayed empty.
      # Must match the ``COPY ... /app/strategies`` in ``backend/Dockerfile``.
      STRATEGIES_ROOT: /app/strategies
      ENVIRONMENT: production
      REPORT_SIGNING_SECRET: ${REPORT_SIGNING_SECRET}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  # Consumes msai:ingest queue (`backend/src/msai/core/queue.py:150`).
  # Without this service prod has no consumer for ingest jobs — symbol
  # onboarding hangs forever. Caught by Council (Contrarian + Maintainer)
  # 2026-05-09.
  ingest-worker:
    image: ${MSAI_REGISTRY}/${MSAI_BACKEND_IMAGE}:${MSAI_GIT_SHA}
    command: ["python", "-m", "arq", "msai.workers.ingest_settings.IngestWorkerSettings"]
    volumes:
      - app_data:/app/data
    environment:
      DATABASE_URL: postgresql+asyncpg://msai:${POSTGRES_PASSWORD}@postgres:5432/msai
      REDIS_URL: redis://redis:6379
      DATA_ROOT: /app/data
      # Where the strategy auto-registration scanner looks for ``*.py``
      # files. Dev compose sets this; prod compose was missing it before
      # 2026-05-12, so the resolved default (``__file__.parents[4] /
      # strategies``) pointed at ``/strategies`` (doesn't exist in the
      # installed-venv image) and the strategy registry stayed empty.
      # Must match the ``COPY ... /app/strategies`` in ``backend/Dockerfile``.
      STRATEGIES_ROOT: /app/strategies
      ENVIRONMENT: production
      REPORT_SIGNING_SECRET: ${REPORT_SIGNING_SECRET}
      POLYGON_API_KEY: ${POLYGON_API_KEY:-}
      DATABENTO_API_KEY: ${DATABENTO_API_KEY:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  # Phase 1 task 1.7: live supervisor. Owns every trading subprocess the
  # system spawns. Consumes commands from msai:live:commands via
  # LiveCommandBus (XAUTOCLAIM PEL recovery + DLQ), runs ProcessManager
  # spawn/reap + HeartbeatMonitor stale sweep. Isolated from arq because
  # on_startup blocks the poll loop (Codex v2 P0).
  #
  # Behind the ``broker`` profile so default `up -d` does NOT touch a
  # running trading session (council Blocking Objection #7).
  live-supervisor:
    image: ${MSAI_REGISTRY}/${MSAI_BACKEND_IMAGE}:${MSAI_GIT_SHA}
    profiles: ["broker"]
    command: ["python", "-m", "msai.live_supervisor"]
    volumes:
      - app_data:/app/data
    environment:
      DATABASE_URL: postgresql+asyncpg://msai:${POSTGRES_PASSWORD}@postgres:5432/msai
      REDIS_URL: redis://redis:6379
      DATA_ROOT: /app/data
      # Where the strategy auto-registration scanner looks for ``*.py``
      # files. Dev compose sets this; prod compose was missing it before
      # 2026-05-12, so the resolved default (``__file__.parents[4] /
      # strategies``) pointed at ``/strategies`` (doesn't exist in the
      # installed-venv image) and the strategy registry stayed empty.
      # Must match the ``COPY ... /app/strategies`` in ``backend/Dockerfile``.
      STRATEGIES_ROOT: /app/strategies
      ENVIRONMENT: production
      REPORT_SIGNING_SECRET: ${REPORT_SIGNING_SECRET}
      # Phase 4 task #154 scope-B: the trading subprocess reads
      # these to construct TradingNodePayload. Inside the Compose
      # network, the gateway is reachable at ``ib-gateway:4004``
      # (paper, socat proxy) or ``ib-gateway:4003`` (live, socat).
      IB_HOST: ib-gateway
      # Socat proxy port. IB Gateway binds to 127.0.0.1:4002/4001
      # internally (see ib-gateway service) and refuses non-loopback
      # API connections; socat re-originates from localhost. Live-mode
      # flip: set IB_PORT=4003 AND IB_API_PORT=4001 (decoupled).
      IB_PORT: ${IB_PORT:-4004}
      IB_ACCOUNT_ID: ${IB_ACCOUNT_ID:?Set IB_ACCOUNT_ID in .env}
      IB_MARKET_DATA_TYPE: ${IB_MARKET_DATA_TYPE:-REALTIME}
      IB_USE_REGULAR_TRADING_HOURS: ${IB_USE_REGULAR_TRADING_HOURS:-false}
      # Force-present so compose fails fast if the operator left
      # ib-gateway's credentials out of .env — otherwise the
      # gateway would crash-loop and live-supervisor would wait
      # forever on the health dependency.
      TWS_USERID: ${TWS_USERID:?Set TWS_USERID in .env}
      TWS_PASSWORD: ${TWS_PASSWORD:?Set TWS_PASSWORD in .env}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ib-gateway:
        # service_healthy (not service_started) — the gateway's
        # healthcheck only passes once IBC has logged in and the
        # TWS API port is accepting connections. Without this the
        # supervisor boots, attempts to connect, and crashes before
        # the gateway is ready.
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  frontend:
    # NEXT_PUBLIC_* env vars are baked into the JS bundle at
    # `pnpm build` time inside the Dockerfile (see frontend/Dockerfile
    # ARG/ENV ordering). The runtime `NEXT_PUBLIC_API_URL` env below is
    # only consumed by Next.js server-rendered pages; client-side bundles
    # see the BUILD-time value. CI must pass `--build-arg
    # NEXT_PUBLIC_AZURE_CLIENT_ID=…`, `--build-arg
    # NEXT_PUBLIC_AZURE_TENANT_ID=…`, and `--build-arg
    # NEXT_PUBLIC_API_URL=…` when building the frontend image.
    image: ${MSAI_REGISTRY}/${MSAI_FRONTEND_IMAGE:?Set MSAI_FRONTEND_IMAGE}:${MSAI_GIT_SHA}
    ports:
      # Slice 3: loopback only — Caddy reaches frontend via the compose network at
      # frontend:3000. Same defense-in-depth as backend.ports.
      - "127.0.0.1:3000:3000"
    environment:
      # Server-side fallback only (Next.js SSR + standalone server reads
      # at runtime). Client bundles see the BUILD-time value baked in by
      # the Dockerfile ARG. Default targets the in-network backend
      # service so SSR fetches resolve correctly inside the compose
      # network if PUBLIC_API_URL is unset.
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://backend:8000}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  # Slice 3: Caddy reverse-proxy with automatic Let's Encrypt TLS termination.
  # The ONLY service publishing host ports 80/443. Routes /api/* to backend:8000
  # and everything else to frontend:3000. Cert state persists in named volumes
  # across restarts. See ./Caddyfile (bind-mounted ro) for routing logic.
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      MSAI_HOSTNAME: ${MSAI_HOSTNAME:?Set MSAI_HOSTNAME (e.g. platform.marketsignal.ai)}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # Interactive Brokers Gateway running inside the Compose network.
  # IBC handles the IB Gateway GUI automatically — no manual clicks.
  # Credentials come from .env via the :? guards which fail compose
  # instantly if missing.
  #
  # Volume mounts preserve TWS settings + IBC state across restarts
  # so "first run" dialogs only fire once. Without this, a container
  # restart after an IB Gateway version bump hits edge cases where
  # IBC can't dismiss the new version's "welcome" dialogs.
  #
  # Behind the ``broker`` profile so default `up -d` does NOT touch
  # a running trading session (council Blocking Objection #7).
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:10.43.1c
    profiles: ["broker"]
    environment:
      TWS_USERID: ${TWS_USERID:?Set TWS_USERID in .env}
      TWS_PASSWORD: ${TWS_PASSWORD:?Set TWS_PASSWORD in .env}
      # TRADING_MODE is configurable in prod because the checklist
      # explicitly walks the operator through flipping from paper
      # to live. Dev compose hard-codes paper to prevent accidents.
      TRADING_MODE: ${TRADING_MODE:-paper}
      # Required for the trading subprocess to submit orders.
      # Override to `yes` only if you're intentionally running in
      # market-data-only mode (no strategy can place orders).
      READ_ONLY_API: ${READ_ONLY_API:-no}
      # Auto-accept the "Accept Incoming Connection" dialog that
      # IB Gateway pops on every new API client connection. Without
      # this the trading subprocess's first connect hangs waiting
      # for a human click.
      TWS_ACCEPT_INCOMING: "accept"
      IBC_INI__IBGateway__TrustedIPs: "127.0.0.1,172.0.0.0/8,192.168.0.0/16"
      EXISTING_SESSION_DETECTED_ACTION: "primary"
      # Bypass "you are running a newer version than the saved
      # settings" dialog after an IB Gateway version bump.
      BYPASS_WARNING: "yes"
      # 2FA handling. Paper accounts don't require 2FA. For live
      # accounts you must configure IBKR Mobile Authenticator and
      # set TWOFA_DEVICE — see gnzsnz docs for details.
      TWOFA_TIMEOUT_ACTION: ${TWOFA_TIMEOUT_ACTION:-exit}
      # IB_API_PORT is gnzsnz's signal for what port IB Gateway binds
      # to internally on 127.0.0.1 — 4002 paper, 4001 live. Decoupled
      # from the client-side ``IB_PORT`` (socat proxy port: 4004
      # paper / 4003 live) so flipping to live mode requires TWO
      # explicit overrides instead of one ambiguous knob.
      #
      # Healthcheck below probes ``$$IB_API_PORT`` from inside the
      # container — i.e. tests that IB Gateway's actual loopback
      # listener is up, which is the precondition for socat to have
      # anything to forward to.
      IB_API_PORT: ${IB_API_PORT:-4002}
    ports:
      # Host-side mapping exposes the SOCAT proxy port (4004 paper /
      # 4003 live) so ``curl 127.0.0.1:4004`` from the VM actually
      # reaches a working API endpoint. Mapping the loopback-only
      # bind (4002/4001) was a no-op — IB Gateway refuses non-127.0.0.1
      # connections so nothing on the host could ever reach it.
      # Bound to localhost to prevent LAN exposure.
      - "127.0.0.1:${IB_PORT:-4004}:${IB_PORT:-4004}"
      - "127.0.0.1:5900:5900"
    volumes:
      - ib_gateway_settings:/home/ibgateway/Jts
    healthcheck:
      # Portable TCP probe via bash's /dev/tcp builtin. Works on
      # the gnzsnz Debian image without requiring nc. The probe
      # opens a TCP connection to whichever API port matches
      # TRADING_MODE (4002 paper, 4001 live) and exits 0 on
      # successful connect.
      #
      # ``$$IB_API_PORT`` with the double-dollar escape tells
      # Compose "don't interpolate this at YAML parse time" — the
      # variable is expanded by bash INSIDE the container at
      # healthcheck run time, reading the container's own
      # IB_API_PORT env var (set above; now decoupled from IB_PORT
      # so the gateway-internal port and the client-side socat port
      # can flip independently).
      #
      # IBC typically takes 60-120s to log in before the port is
      # ready, so start_period is generous.
      test:
        [
          "CMD-SHELL",
          "bash -c 'exec 3<>/dev/tcp/localhost/$$IB_API_PORT' 2>/dev/null",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 180s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G

volumes:
  # Pin Docker volume names so a compose-project rename (e.g. parent
  # directory rename) does NOT orphan data volumes. Without `name:`,
  # the volume is prefixed with the project name and would reappear
  # as a new empty volume after the rename — silent data loss. This
  # bit us once on 2026-04-19 during the claude-version → repo-root
  # flatten; the data was recoverable via migration, but the fix is
  # to pin names so the bug cannot recur.
  postgres_data:
    name: msai_postgres_data
  app_data:
    name: msai_app_data
  ib_gateway_settings:
    name: msai_ib_gateway_settings
  # Slice 3: Caddy ACME state (account keys, issued certs) and runtime config.
  # Persists across restarts so we don't re-issue certs every deploy (LE rate
  # limit: 5 certs / hostname / week).
  caddy_data:
    name: msai_caddy_data
  caddy_config:
    name: msai_caddy_config
