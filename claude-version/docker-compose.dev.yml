# MSAI v2 — Claude Version (Dev)
# Ports: Frontend 3300, Backend 8800, PostgreSQL 5433, Redis 6380
#
# Run: docker compose -f docker-compose.dev.yml up -d
#
# IB Gateway is behind the `broker` Compose profile:
#   COMPOSE_PROFILES=broker docker compose -f docker-compose.dev.yml --env-file .env up -d
#
# Without the profile, the stack boots without IB credentials — safe for
# frontend/backend/worker development.

# Shared worker config — DRY via YAML extension fields
x-worker-build: &worker-build
  build:
    context: ./backend
    dockerfile: Dockerfile.dev

x-worker-volumes: &worker-volumes
  volumes:
    - ./backend/src:/app/src:ro
    - ./strategies:/app/strategies:ro
    - ./data:/app/data

x-worker-env: &worker-env
  DATABASE_URL: postgresql+asyncpg://msai:msai_dev_password@postgres:5432/msai
  REDIS_URL: redis://redis:6379
  DATA_ROOT: /app/data
  STRATEGIES_ROOT: /app/strategies
  ENVIRONMENT: development
  MSAI_API_KEY: ${MSAI_API_KEY:-msai-dev-key}
  DATABENTO_API_KEY: ${DATABENTO_API_KEY:-}
  IB_ACCOUNT_ID: ${IB_ACCOUNT_ID:-}
  IB_GATEWAY_HOST: ${IB_GATEWAY_HOST:-ib-gateway}
  IB_GATEWAY_PORT_PAPER: 4004
  IB_GATEWAY_PORT_LIVE: 4003
  IB_ALLOW_MOCK_FALLBACK: ${IB_ALLOW_MOCK_FALLBACK:-true}

x-worker-depends: &worker-depends
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy

x-worker-healthcheck: &worker-healthcheck
  test: ["CMD", "uv", "run", "python", "-c", "from redis import Redis; Redis.from_url('redis://redis:6379').ping()"]
  interval: 15s
  timeout: 5s
  retries: 5

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:16-alpine
    container_name: msai-claude-postgres
    environment:
      POSTGRES_DB: msai
      POSTGRES_USER: msai
      POSTGRES_PASSWORD: msai_dev_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U msai"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  redis:
    image: redis:7-alpine
    container_name: msai-claude-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ---------------------------------------------------------------------------
  # Backend API
  # ---------------------------------------------------------------------------

  backend:
    <<: *worker-build
    container_name: msai-claude-backend
    ports:
      - "8800:8000"
    volumes:
      - ./backend/src:/app/src:ro
      - ./backend/alembic:/app/alembic:ro
      - ./backend/alembic.ini:/app/alembic.ini:ro
      - ./strategies:/app/strategies:ro
      - ./data:/app/data
    environment:
      <<: *worker-env
      IB_CLIENT_ID: 10
      IB_DATA_CLIENT_ID: 101
      IB_EXEC_CLIENT_ID: 102
      IB_MARKET_DATA_TYPE: ${IB_MARKET_DATA_TYPE:-REALTIME}
    depends_on:
      <<: *worker-depends
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=2).status == 200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  # ---------------------------------------------------------------------------
  # Workers (arq job queues)
  # ---------------------------------------------------------------------------

  backtest-worker:
    <<: [*worker-build, *worker-volumes]
    container_name: msai-claude-backtest-worker
    command: ["uv", "run", "arq", "msai.workers.settings.WorkerSettings"]
    environment:
      <<: *worker-env
    depends_on:
      <<: *worker-depends
    healthcheck:
      <<: *worker-healthcheck
    restart: unless-stopped

  research-worker:
    <<: [*worker-build, *worker-volumes]
    container_name: msai-claude-research-worker
    command: ["uv", "run", "arq", "msai.workers.research_settings.ResearchWorkerSettings"]
    environment:
      <<: *worker-env
    depends_on:
      <<: *worker-depends
    healthcheck:
      <<: *worker-healthcheck
    restart: unless-stopped

  portfolio-worker:
    <<: [*worker-build, *worker-volumes]
    container_name: msai-claude-portfolio-worker
    command: ["uv", "run", "arq", "msai.workers.portfolio_settings.WorkerSettings"]
    environment:
      <<: *worker-env
    depends_on:
      <<: *worker-depends
    healthcheck:
      <<: *worker-healthcheck
    restart: unless-stopped

  ingest-worker:
    <<: [*worker-build, *worker-volumes]
    container_name: msai-claude-ingest-worker
    command: ["uv", "run", "arq", "msai.workers.ingest_settings.IngestWorkerSettings"]
    environment:
      <<: *worker-env
    depends_on:
      <<: *worker-depends
    healthcheck:
      <<: *worker-healthcheck
    restart: unless-stopped

  job-watchdog:
    <<: [*worker-build, *worker-volumes]
    container_name: msai-claude-job-watchdog
    command: ["uv", "run", "arq", "msai.workers.settings.WorkerSettings"]
    environment:
      <<: *worker-env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      <<: *worker-healthcheck
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # IB Gateway (broker profile — requires credentials in .env)
  # ---------------------------------------------------------------------------

  live-supervisor:
    profiles: ["broker"]
    <<: [*worker-build, *worker-volumes]
    container_name: msai-claude-live-supervisor
    command: ["uv", "run", "python", "-m", "msai.live_supervisor"]
    environment:
      <<: *worker-env
      IB_GATEWAY_HOST: ib-gateway
      IB_GATEWAY_PORT_PAPER: 4004
      IB_GATEWAY_PORT_LIVE: 4003
      IB_CLIENT_ID: 30
      IB_DATA_CLIENT_ID: 101
      IB_EXEC_CLIENT_ID: 102
      IB_ACCOUNT_ID: ${IB_ACCOUNT_ID:?Set IB_ACCOUNT_ID in .env}
      IB_MARKET_DATA_TYPE: ${IB_MARKET_DATA_TYPE:-REALTIME}
      TWS_USERID: ${TWS_USERID:?Set TWS_USERID in .env}
      TWS_PASSWORD: ${TWS_PASSWORD:?Set TWS_PASSWORD in .env}
      GATEWAY_CONFIG: ${GATEWAY_CONFIG:-}
    depends_on:
      <<: *worker-depends
      ib-gateway:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  ib-gateway:
    profiles: ["broker"]
    image: ghcr.io/gnzsnz/ib-gateway:stable
    container_name: msai-claude-ib-gateway
    command:
      - /bin/sh
      - -lc
      - |
        if [ -z "$${TWS_USERID}" ] || [ -z "$${TWS_PASSWORD}" ]; then
          echo "ib-gateway requires TWS_USERID and TWS_PASSWORD in .env" >&2
          exit 64
        fi
        exec /home/ibgateway/scripts/run.sh
    environment:
      TWS_USERID: ${TWS_USERID:-}
      TWS_PASSWORD: ${TWS_PASSWORD:-}
      TRADING_MODE: ${TRADING_MODE:-paper}
      # Default to ``no`` so paper-trading orders can be submitted
      # without a per-session env override. ``yes`` blocks every order
      # with IB error 321 ("API interface is currently in Read-Only
      # mode") — bit us twice during the 2026-04-15 drill. Operators
      # running with real-money accounts should override via
      # ``READ_ONLY_API=yes`` in ``.env`` until they're ready to trade.
      READ_ONLY_API: ${READ_ONLY_API:-no}
      TWS_SETTINGS_PATH: /home/ibgateway/tws_settings
      AUTO_RESTART_TIME: ${IB_AUTO_RESTART_TIME:-11:45 PM}
      RELOGIN_AFTER_TWOFA_TIMEOUT: ${IB_RELOGIN_AFTER_TWOFA_TIMEOUT:-yes}
      TWOFA_TIMEOUT_ACTION: ${IB_TWOFA_TIMEOUT_ACTION:-restart}
      EXISTING_SESSION_DETECTED_ACTION: ${IB_EXISTING_SESSION_ACTION:-primary}
      TWS_ACCEPT_INCOMING: ${IB_TWS_ACCEPT_INCOMING:-accept}
      BYPASS_WARNING: ${IB_BYPASS_WARNING:-yes}
      TIME_ZONE: ${IB_TIME_ZONE:-America/Chicago}
      JAVA_HEAP_SIZE: ${IB_JAVA_HEAP_SIZE:-1024}
      VNC_SERVER_PASSWORD: ${VNC_SERVER_PASSWORD:-msai-dev-vnc}
    ports:
      - "127.0.0.1:5900:5900"
    volumes:
      - ./data/ib-gateway:/home/ibgateway/tws_settings
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -lc ': >/dev/tcp/127.0.0.1/4002' || timeout 2 bash -lc ': >/dev/tcp/127.0.0.1/4001'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s

  # ---------------------------------------------------------------------------
  # Frontend
  # ---------------------------------------------------------------------------

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: msai-claude-frontend
    ports:
      - "3300:3000"
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8800
      NEXT_PUBLIC_MSAI_API_KEY: ${MSAI_API_KEY:-msai-dev-key}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
